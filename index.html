<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamX PRO IPTV</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
margin:0;
font-family:Poppins;
background:#0b0f1a;
color:white;
overflow-x:hidden;
}

/* ===== NETFLIX HEADER ===== */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:rgba(0,0,0,0.8);
position:fixed;
width:100%;
top:0;
z-index:10;
backdrop-filter:blur(10px);
}

.logo{
color:#e50914;
font-size:22px;
font-weight:800;
}

input{
padding:8px 12px;
border-radius:20px;
border:none;
outline:none;
width:200px;
}

/* ===== HERO ===== */
.hero{
margin-top:70px;
padding:20px;
background:linear-gradient(to right,#000,transparent),url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4');
background-size:cover;
height:220px;
display:flex;
align-items:center;
}

.hero h1{
font-size:28px;
}

/* ===== M3U INPUT ===== */
.m3u-box{
padding:15px;
background:#111827;
display:flex;
gap:10px;
}

.m3u-box input{
flex:1;
border-radius:10px;
}

.m3u-box button{
background:#e50914;
color:white;
border:none;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
}

/* ===== ROW STYLE (Netflix) ===== */
.row{
padding:10px 15px;
}

.row h2{
font-size:16px;
margin:10px 0;
}

.scroll{
display:flex;
gap:10px;
overflow-x:auto;
}

.card{
min-width:160px;
background:#1f2937;
padding:10px;
border-radius:12px;
cursor:pointer;
transition:0.3s;
text-align:center;
}

.card:hover{
transform:scale(1.08);
background:#e50914;
}

/* ===== PLAYER ===== */
.player{
position:fixed;
bottom:0;
left:0;
width:100%;
height:40%;
background:black;
display:none;
}

video{
width:100%;
height:100%;
}
</style>
</head>

<body>

<header>
<div class="logo">STREAMX</div>
<input type="text" id="search" placeholder="Search channels">
</header>

<div class="hero">
<h1>Unlimited Live TV & Movies</h1>
</div>

<!-- M3U LOADER -->
<div class="m3u-box">
<input type="text" id="m3uUrl" placeholder="Paste M3U playlist URL here">
<button onclick="loadM3U()">Load Playlist</button>
</div>

<!-- CHANNEL ROW -->
<div class="row">
<h2>🔥 Live Channels</h2>
<div class="scroll" id="channelList"></div>
</div>

<!-- PLAYER -->
<div class="player" id="playerBox">
<video id="video" controls></video>
</div>

<script>
let video = document.getElementById("video");
let playerBox = document.getElementById("playerBox");

let channels = [];

/* ======================
   M3U LOADER
====================== */
function loadM3U(){
let url = document.getElementById("m3uUrl").value;

if(!url){
alert("Paste M3U URL");
return;
}

fetch(url)
.then(res=>res.text())
.then(data=>{
parseM3U(data);
});
}

/* ======================
   SIMPLE M3U PARSER
====================== */
function parseM3U(data){
channels = [];
let lines = data.split("\n");

for(let i=0;i<lines.length;i++){
if(lines[i].startsWith("#EXTINF")){
let name = lines[i].split(",")[1] || "Channel";
let stream = lines[i+1];

if(stream && stream.startsWith("http")){
channels.push({name, stream});
}
}
}

renderChannels();
}

/* ======================
   RENDER UI (NETFLIX STYLE)
====================== */
function renderChannels(){
let list = document.getElementById("channelList");
list.innerHTML="";

channels.forEach(ch=>{
let div = document.createElement("div");
div.className="card";
div.innerHTML=`📺<br>${ch.name}`;

div.onclick=()=>{
play(ch.stream);
};

list.appendChild(div);
});
}

/* ======================
   PLAY STREAM
====================== */
function play(url){
playerBox.style.display="block";

if(Hls.isSupported()){
let hls = new Hls();
hls.loadSource(url);
hls.attachMedia(video);
hls.on(Hls.Events.MANIFEST_PARSED,function(){
video.play();
});
}
else{
video.src=url;
video.play();
}
}
</script>

</body>
</html>
